<!DOCTYPE html>
<html lang = en>
    <head>
        <title>
            CWA Help Desk Appointment
        </title>
        <meta charset = "UTF-8">
        <meta name = "description" content = "CWA Help Desk Appointment Website">
        <meta name = "keywords" content = "CWA, Help, Desk, Appointment">
        <meta name = "author" content = "Tom Hollday">
    </head>
    <body>
        <form action="submit.php" method="post">
            <a href="https://www.swin.edu.au">
                    <img src = "images/logo.png"
                    alt = "Swinburne University Logo"
                    loading = "lazy">
            </a>
            <h1>
                <strong>CWA Help Desk Appointment</strong>
            </h1>
            <p>
                The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday.
                <br><br>
                Check Blackboard for when CWA tutors will be there.
            </p>
            <fieldset>
                <legend>
                    Student Details
                </legend>
                <label for="student_id">Student ID</label>
                <input type = "text" id = "student_id" name="student_id" required = "required" pattern ="[\d]{7,10}">
                <br>
                <label for="first_name">Given Name</label>
                <input type = "text" id = "first_name" name = "student_first_name" pattern ="^(?=.*[A-Za-z])[A-Za-z]{,15}">
                <label for="last_name">Family Name</label>
                <input type = "text" id = "last_name" name = "student_family_name" pattern ="^(?=.*[A-Za-z])[A-Za-z]{,15}">
            </fieldset>

            <fieldset>
                <legend>
                    Your Unit
                </legend>
                <input type = "radio" id = "cos_10011" name = "unit_selection" required = "required">
                <label for="cos_10011">COS10011</label>
                <input type = "radio" id = "cos_60004" name = "unit_selection">
                <label for="cos_60004">COS60004</label>
                <input type = "radio" id = "cos_60007" name = "unit_selection">
                <label for="cos_60007">COS60007</label>
                <br>
                <label for="tutor_name">Your Tutor</label>
                <select name = "tutor_name" id = "tutor_name">
                    <option value ="">Please Select</option>
                    <option value = "jedi_knight">Jed I. Night</option>
                    <option value = "elevator">Ella Vader</option>
                    <option value = "crispy_bacon">Chris P. Bacon</option>
                    <option value = "jekyll_and_hyde">Jacqueline Hyde</option>
                    <option value = "blah_blah_blah">Bob Lablaw</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>
                    Issue
                </legend>
                <input type = "checkbox" id = "html" name = "issue" checked = "checked">
                <label for="html">HTML</label>
                <input type = "checkbox" id = "css" name = "issue">
                <label for="css">CSS</label>
                <input type = "checkbox" id = "java_script" name = "issue">
                <label for="java_script">JavaScript</label>
                <input type = "checkbox" id = "php" name = "issue">
                <label for="php">PHP</label>
                <input type = "checkbox" id = "my_sql" name = "issue">
                <label for="my_sql">MySQL</label>
                <br>
                <label for="issue_description">Description of Issue</label>
                <br>
                <textarea id="issue_description" name = "issue_description" rows="4" cols="50" placeholder="Write description of your problem here..."></textarea>
            </fieldset>

            <fieldset>
                <legend>
                    Preferred Date/Time
                </legend>
                <label for="date">Date</label>
                <input type ="text" id="date" name ="date" pattern ="\d{4}" placeholder="dd/mm/yyyy">
                <label for="time">Time</label>
                <input type ="text" id="time" name ="time" pattern ="([01]?[0-9]|2[0-3]):[0-5][0-9]" placeholder="00:00">                
            </fieldset>
            <input type="submit" value="Book">
            <input type="reset" value="Reset Form">
        </form>
    </body>
</html>
