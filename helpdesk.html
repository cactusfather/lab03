<!DOCTYPE html>
<html lang = en>
<head>
    <title>
        CWA Help Desk Appointment
    </title>
    <meta charset = "UTF-8">
    <meta name = "description" content = "CWA Help Desk Appointment Website">
    <meta name = "keywords" content = "CWA, Help, Desk, Appointment">
    <meta name = "author" content = "Tom Hollday">
</head>
<body>
    <a href="https://www.swin.edu.au">
            <img src = "images/logo.png"
            alt = "Swinburne University Logo"
            loading = "lazy">
        target="_blank"
        title="Swinburne Website"</a>
    <h1>
        <strong>CWA Help Desk Appointment</strong>
    </h1>
    <p>
        The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday.

        Check Blackboard for when CWA tutors will be there.
    </p>
    <section>
        <h2>
            Student Details
        </h2>
        <fieldset>
            <input type = "text" id = "student_id" name="student_id" required = "required" pattern ="[A-Za-z\d]{7,10}">
            <label for="student_id">Student ID</label>
            <br>
            <input type = "text" id = "first_name" name = "student_first_name" value = "first_name" pattern ="^(?=.*[A-Za-z])[A-Za-z]{,15}">
            <label for="first_name">Given Name</label>
            <input type = "text" id = "last_name" name = "student_family_name" value = "last_name" pattern ="^(?=.*[A-Za-z])[A-Za-z]{,15}">
            <label for="last_name">Family Name</label>
        </fieldset>
    </section>
    <section>
        <h2>
            Your Unit
        </h2>
        <fieldset>
            
        </fieldset>

    </section>
</body>



</html>
